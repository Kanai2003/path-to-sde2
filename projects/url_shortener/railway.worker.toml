# Railway config for the analytics worker service.
# Same repo + root dir + Docker image as the web service; only the start
# command differs. Point the worker service's Config-as-code path at this file
# (Settings → Config-as-code → railway.worker.toml).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Consumes Redis Streams analytics events; no migrations (web service runs those),
# no HTTP server, so NO healthcheckPath here.
startCommand = "python -m app.workers.analytics_worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
