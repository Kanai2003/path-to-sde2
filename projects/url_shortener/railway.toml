# Railway service config. Effective when the service's Root Directory is set
# to projects/url_shortener. Docker builds the final stage (production).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# start.sh runs migrations then uvicorn; keep this empty to use the image CMD.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
